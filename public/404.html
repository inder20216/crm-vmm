<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect — encodes the path and sends it to index.html
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?r=' + encodeURIComponent(l.pathname.slice(1) + l.search + l.hash)
    );
  </script>
</head>
<body></body>
</html>
